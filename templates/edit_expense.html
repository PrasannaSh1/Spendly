{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_expense.css') }}">
{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update the details of this transaction</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           value="{{ form.amount if form else expense.amount }}"
                           placeholder="0.00" required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not (form.category if form else expense.category) %}selected{% endif %}>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if (form.category if form else expense.category) == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ form.date if form else expense.date }}" required>
                </div>
                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="e.g. Groceries at BigBasket"
                           value="{{ form.description if form else (expense.description or '') }}">
                </div>
                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}" class="edit-expense-cancel">Cancel and go back</a>
        </p>

    </div>
</section>

{% endblock %}
